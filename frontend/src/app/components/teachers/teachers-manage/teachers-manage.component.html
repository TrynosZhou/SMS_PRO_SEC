<div class="sm-wrap">
  <header class="sm-header">
    <h1 class="sm-title">Teacher Manager</h1>
    <p class="sm-sub">Add teachers, assign classes, and use the admin record book</p>
  </header>

  <nav class="sm-tabs" aria-label="Teacher manager sections">
    <a
      routerLink="/teachers/manage/add-new"
      routerLinkActive="active"
      class="sm-tab"
    >
      <span class="sm-tab-ico" aria-hidden="true">📝</span>
      Add New
    </a>
    <a
      routerLink="/teachers/manage/teachers"
      [class.active]="isTeachersSectionActive()"
      class="sm-tab"
    >
      <span class="sm-tab-ico" aria-hidden="true">👨‍🏫</span>
      Teachers
    </a>
    <a
      routerLink="/teachers/manage/assign-classes"
      routerLinkActive="active"
      class="sm-tab"
    >
      <span class="sm-tab-ico" aria-hidden="true">🗂️</span>
      Assign Classes
    </a>
    <a
      routerLink="/teachers/manage/record-book"
      routerLinkActive="active"
      class="sm-tab"
    >
      <span class="sm-tab-ico" aria-hidden="true">📘</span>
      Record Book
    </a>
  </nav>

  <div class="sm-outlet">
    <router-outlet></router-outlet>
  </div>
</div>
